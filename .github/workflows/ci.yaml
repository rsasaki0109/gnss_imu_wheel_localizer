name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y python3-colcon-common-extensions python3-rosdep libgeographic-dev
          rosdep update
          rosdep install --from-paths . --ignore-src -y

      - name: Build
        run: |
          . /opt/ros/humble/setup.sh
          colcon build --packages-select gnss_imu_wheel_localizer

      - name: Test
        run: |
          . /opt/ros/humble/setup.sh
          colcon test --packages-select gnss_imu_wheel_localizer
          colcon test-result --verbose
