gnss_imu_wheel_localizer:
  ros__parameters:
    gnss_topic: "/sensing/gnss/ublox/nav_sat_fix"
    imu_topic: "/sensing/imu/tamagawa/imu_raw"
    wheel_odom_topic: "/localization/kinematic_state"
    velocity_report_topic: "/vehicle/status/velocity_status"

    map_frame: "map"
    odom_frame: "odom"
    base_link_frame: "base_link"

    publish_tf: true
    use_3d_position: false
    use_attitude: false

    override_origin: false
    origin_latitude: 0.0
    origin_longitude: 0.0
    origin_altitude: 0.0

    enable_pose_csv_logging: true
    pose_csv_path: "/home/autoware/ros2_ws/data/gnss_imu_wheel_localizer/pose.csv"

    process_noise_diagonal: [0.5, 0.5, 0.5, 0.1, 0.1, 0.1, 1.0]
    initial_covariance_diagonal: [5.0, 5.0, 5.0, 0.5, 0.5, 0.5, 1.0]
    gnss_position_noise: [1.0, 1.0, 2.0]
    wheel_velocity_noise: 0.5
    imu_yaw_noise: 0.1
    imu_attitude_noise: 0.1
